<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Dark Liquid Store</title>
    <style>
        /* Dark & Liquid Glass Dizayn */
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            padding: 20px;
            margin-top: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 90%;
            margin-top: 40px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s ease;
            text-align: center;
        }

        .product-card:hover {
            transform: scale(1.05);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            background: #111;
        }

        .price {
            font-size: 1.5rem;
            color: #00d2ff;
            margin: 15px 0;
        }

        .buy-btn {
            background: #00d2ff;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Kateqoriya Menyusu */
        .nav-menu {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .nav-item {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="glass-header">
    <h1>Dark Store</h1>
    <div class="nav-menu">
        <div class="nav-item">LMC Config</div>
        <div class="nav-item">Saatlar</div>
        <div class="nav-item">Elektronika</div>
        <div class="nav-item">Paltarlar</div>
    </div>
</div>

<div class="container" id="shop">
    <div class="product-card">
        <img src="https://via.placeholder.com/300" class="product-img">
        <h3>LMC 8.4 Config</h3>
        <p>Premium rəng tənzimləmələri</p>
        <div class="price">5.00 AZN</div>
        <button class="buy-btn">WhatsApp ilə Al</button>
    </div>
</div>

</body>
</html>
