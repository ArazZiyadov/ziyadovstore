<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziyadov Store</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff;
            --premium: #ffcc00;
            --bg: #0d0d0f;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin: 0; font-size: 22px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
        }

        .product-img {
            width: 100%;
            height: 160px;
            border-radius: 18px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        
        .price-tag {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .premium-card { border: 1px solid var(--premium); background: rgba(255, 204, 0, 0.05); }
        .premium-card .price-tag { color: var(--premium); }
        .premium-card .buy-btn { background: var(--premium); color: black; }

        .buy-btn {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px;
            display: block;
            border-radius: 18px;
            font-weight: bold;
            font-size: 15px;
            border: none;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Ziyadov Store</h1>
</header>

<div class="container">
    
    <div class="card">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400" class="product-img">
        <div class="title">10-lu Paket</div>
        <div class="price-tag">15 AZN</div>
        <button class="buy-btn" onclick="order('10-lu Paket', '15')">Sifariş Et (WhatsApp)</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=400" class="product-img">
        <div class="title">20-li Paket</div>
        <div class="price-tag">25 AZN</div>
        <button class="buy-btn" onclick="order('20-li Paket', '25')">Sifariş Et (WhatsApp)</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1433086566280-608bd7d5440b?w=400" class="product-img">
        <div class="title">30-lu Paket</div>
        <div class="price-tag">35 AZN</div>
        <button class="buy-btn" onclick="order('30-lu Paket', '35')">Sifariş Et (WhatsApp)</button>
    </div>

    <div class="card premium-card">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400" class="product-img">
        <div class="title">✨ PREMIUM Paket ✨</div>
        <div class="price-tag">5 AZN</div>
        <button class="buy-btn" onclick="order('PREMIUM Paket', '5')">Sifariş Et (WhatsApp)</button>
    </div>

</div>

<script>
    function order(name, price) {
        let phone = "994515114568";
        let message = "Salam Ziyadov Store! Mən saytdan bu paketi almaq istəyirəm:\n\n📦 Paket: " + name + "\n💰 Qiymət: " + price + " AZN";
        window.location.href = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
    }
</script>

</body>
</html>
