<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziyadov Store</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --accent: #00d2ff;
            --bg: #0d0d0f;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Mobil üçün başlıq */
        header {
            width: 100%;
            text-align: center;
            padding: 30px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; color: var(--accent); }

        /* Liquid Glass Kart */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            width: 100%;
            max-width: 350px;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-img {
            width: 100%;
            height: 200px;
            background: #1a1a1c;
            border-radius: 20px;
            object-fit: cover;
            cursor: pointer; /* Şəkli dəyişmək üçün kliklə */
        }

        .editable-title { font-size: 20px; margin: 15px 0 5px 0; outline: none; }
        .editable-desc { font-size: 14px; opacity: 0.7; margin-bottom: 15px; outline: none; }

        .price-container {
            font-size: 26px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .buy-btn {
            background: var(--accent);
            color: black;
            text-decoration: none;
            padding: 15px;
            display: block;
            border-radius: 18px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        /* Gizli Admin Mesajı */
        .admin-hint {
            font-size: 10px;
            color: #444;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Ziyadov Store</h1>
</header>

<div class="card">
    <img src="https://via.placeholder.com/400x300/111/00d2ff?text=LMC+8.4+Config" 
         class="product-img" id="mainImg" onclick="changeImage()">
    
    <div class="editable-title" contenteditable="true" id="pTitle">LMC 8.4 Config</div>
    <div class="editable-desc" contenteditable="true" id="pDesc">Premium rəng tənzimləmələri</div>
    
    <div class="price-container">
        <span contenteditable="true" id="pPrice">5.00</span> AZN
    </div>

    <a href="#" class="buy-btn" id="waLink" onclick="updateWA()">WhatsApp ilə Al</a>
</div>

<p class="admin-hint">Admin: Yazıların üstünə basaraq redaktə edə bilərsən.</p>

<script>
    // Şəkli dəyişmək üçün funksiya
    function changeImage() {
        let newImg = prompt("Yeni şəkil linkini yapışdırın:", "");
        if (newImg) document.getElementById('mainImg').src = newImg;
    }

    // WhatsApp linkini avtomatik yeniləyir
    function updateWA() {
        let title = document.getElementById('pTitle').innerText;
        let price = document.getElementById('pPrice').innerText;
        let phone = "994XXXXXXXXX"; // BURAYA ÖZ NÖMRƏNİ YAZ
        let text = `Salam, ${title} almaq istəyirəm. Qiyməti: ${price} AZN`;
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
    }
</script>

</body>
</html>
