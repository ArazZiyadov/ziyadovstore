<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziyadov Store</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00d2ff;
            --premium: #ffcc00;
            --bg: #08080a;
            --success: #25D366;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            background: rgba(8, 8, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            overflow-x: auto;
            padding: 15px 10px;
            justify-content: center;
            gap: 10px;
        }

        nav button {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 14px;
        }

        nav button.active {
            background: var(--accent);
            color: black;
            font-weight: bold;
        }

        header {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 25px 0;
        }

        h1 { margin: 0; font-size: 24px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        .page-section { display: none; width: 100%; max-width: 400px; padding: 0 20px 40px 20px; box-sizing: border-box; }
        .page-section.active { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 18px;
            text-align: center;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 170px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 15px;
            background: #111;
        }

        .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .info { font-size: 13px; color: #bbb; margin-bottom: 12px; line-height: 1.4; }
        .price { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }
